<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alinear</title>

    <style>
        .caja{
            border: 2px solid black;
            margin: 20px;
            padding: 2px;
        }

        .block{
            display: block;
        }

        .medio-bloque{
            width: 50vw;
        }

        .inline{
            display: inline;
        }

        .inline-block{
            display: inline-block;
        }

        .oculto{
            display: none;
        }
        .invisible{
            visibility: hidden;
        }

        .flex{
            display: flex;
        }
    </style>
</head>
<body>
    
    <!--Display block-->
    <span class="caja block">Texto en bloque</span>
    <span class="caja block">Texto en bloque</span>
    <span class="caja block medio-bloque">Texto en bloque</span>

    <!--Display none y hidden-->
    <span class="oculto">Texto none</span>
    <span class="invisible">Texto invisible</span>
    <br>

    <!--Display inline-->
    <span class="caja inline">Texto inline</span>
    <span class="caja inline medio-bloque">Texto inline</span>
    <span class="caja inline-block medio-bloque">Texto inline-block</span>

    <!--Display flex-->
    <div class="flex">
        <span class="caja">Texto flex</span>
        <span class="caja">Texto flex</span>
        <span class="caja">Texto flex</span>
        <span class="caja">Texto flex</span>
        <span class="caja">Texto flex</span>
        <span class="caja">Texto flex</span>
        <span class="caja">Texto flex</span>
        <span class="caja">Texto flex</span>
    </div>

    <!--Display grid-->


</body>
</html>
