<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Html box</title>

    <style>
        .contenedor div{
            width: 100px;
            height: 100px;
            background-color: black;
            margin: 10px;
        }

        .contenedor{
            display: flex;
        }

        .contenedor div:nth-child(2n+2){
            background-color: green;
        }

        .contenedor div:nth-child(2n+1){
            background-color: purple;
        }

        
        .contenedor div:nth-child(even){
            background-color: green;
        }

        .contenedor div:nth-child(odd){
            background-color: purple;
        }
    </style>
</head>
<body>
    <div class="contenedor">
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
    </div>
</body>
</html>
