<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Html box</title>

    <style>
        .contenedor div{
            width: 100px;
            height: 100px;
            background-color: black;
            margin: 10px;
        }

        .contenedor{
            display: flex;
        }

        .contenedor div:nth-child(2n+2){
            background-color: green;
        }

        .contenedor div:nth-child(2n+1){
            background-color: purple;
        }

        
        .contenedor div:nth-child(even){
            background-color: green;
        }

        .contenedor div:nth-child(odd){
            background-color: purple;
        }
    </style>
</head>
<body>
    <div class="contenedor">
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
    </div>
    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2900.6263347764357!2d-5.8797274249082685!3d43.36392617109387!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0xd368da5fa3e330b%3A0xf5056af32c3fe712!2sUNENDO%20-%20Centro%20de%20formaci%C3%B3n%20profesional%20en%20Oviedo!5e0!3m2!1ses!2ses!4v1772445717334!5m2!1ses!2ses" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
</body>
</html>
